{{- if .Values.ocpiSim.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-ocpi-sim
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "ocpi-sim") | nindent 4 }}
spec:
  replicas: {{ .Values.ocpiSim.replicaCount }}
  selector:
    matchLabels:
      {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "ocpi-sim") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.ocpiSim.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "ocpi-sim") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ocpi-sim
          image: {{ include "evtivity-csms.image" (dict "context" . "component" "ocpi-simulator" "values" .Values.ocpiSim) }}
          imagePullPolicy: {{ include "evtivity-csms.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: {{ .Values.ocpiSim.port }}
              protocol: TCP
          env:
            - name: OCPI_SIM_PORT
              value: {{ .Values.ocpiSim.port | quote }}
            - name: OCPI_SIM_ROLE
              value: {{ .Values.ocpiSim.env.role | quote }}
            {{- if .Values.ocpiSim.env.baseUrl }}
            - name: OCPI_SIM_BASE_URL
              value: {{ .Values.ocpiSim.env.baseUrl | quote }}
            {{- else }}
            - name: OCPI_SIM_BASE_URL
              value: "http://{{ include "evtivity-csms.fullname" . }}-ocpi-sim:{{ .Values.ocpiSim.port }}"
            {{- end }}
            - name: OCPI_SIM_COUNTRY_CODE
              value: {{ .Values.ocpiSim.env.countryCode | quote }}
            - name: OCPI_SIM_PARTY_ID
              value: {{ .Values.ocpiSim.env.partyId | quote }}
            - name: OCPI_SIM_NAME
              value: {{ .Values.ocpiSim.env.name | quote }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.ocpiSim.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.ocpiSim.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ocpiSim.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ocpiSim.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

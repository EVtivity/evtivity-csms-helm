{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-secrets
  labels:
    {{- include "evtivity-csms.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  SETTINGS_ENCRYPTION_KEY: {{ .Values.secrets.settingsEncryptionKey | b64enc | quote }}
{{- end }}

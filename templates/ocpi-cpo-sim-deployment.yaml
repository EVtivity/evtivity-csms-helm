{{- if .Values.ocpiCpoSim.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-ocpi-cpo-sim
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "ocpi-cpo-sim") | nindent 4 }}
spec:
  replicas: {{ .Values.ocpiCpoSim.replicaCount }}
  selector:
    matchLabels:
      {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "ocpi-cpo-sim") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.ocpiCpoSim.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "ocpi-cpo-sim") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ocpi-cpo-sim
          image: {{ include "evtivity-csms.image" (dict "context" . "component" "ocpi-simulator" "values" .Values.ocpiCpoSim) }}
          imagePullPolicy: {{ include "evtivity-csms.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: {{ .Values.ocpiCpoSim.port }}
              protocol: TCP
          env:
            - name: OCPI_SIM_PORT
              value: {{ .Values.ocpiCpoSim.port | quote }}
            - name: OCPI_SIM_ROLE
              value: {{ .Values.ocpiCpoSim.env.role | quote }}
            {{- if .Values.ocpiCpoSim.env.baseUrl }}
            - name: OCPI_SIM_BASE_URL
              value: {{ .Values.ocpiCpoSim.env.baseUrl | quote }}
            {{- else }}
            - name: OCPI_SIM_BASE_URL
              value: "http://{{ include "evtivity-csms.fullname" . }}-ocpi-cpo-sim:{{ .Values.ocpiCpoSim.port }}"
            {{- end }}
            - name: OCPI_SIM_COUNTRY_CODE
              value: {{ .Values.ocpiCpoSim.env.countryCode | quote }}
            - name: OCPI_SIM_PARTY_ID
              value: {{ .Values.ocpiCpoSim.env.partyId | quote }}
            - name: OCPI_SIM_NAME
              value: {{ .Values.ocpiCpoSim.env.name | quote }}
            - name: OCPI_SIM_AUTO_SESSION
              value: {{ .Values.ocpiCpoSim.env.autoSession | quote }}
            - name: OCPI_SIM_SESSION_INTERVAL
              value: {{ .Values.ocpiCpoSim.env.sessionInterval | quote }}
            - name: OCPI_SIM_SESSION_DURATION
              value: {{ .Values.ocpiCpoSim.env.sessionDuration | quote }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.ocpiCpoSim.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.ocpiCpoSim.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ocpiCpoSim.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ocpiCpoSim.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

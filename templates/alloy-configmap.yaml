{{- if and .Values.monitoring.enabled .Values.monitoring.alloy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-alloy-config
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "alloy") | nindent 4 }}
data:
  config.alloy: |
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        own_namespace = true
      }
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
        target_label  = "service"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.process.pods.receiver]
    }

    loki.process "pods" {
      stage.cri {}

      stage.static_labels {
        values = {
          job = "kubernetes",
        }
      }

      forward_to = [loki.write.loki.receiver]
    }

    loki.write "loki" {
      endpoint {
        url = "http://{{ include "evtivity-csms.fullname" . }}-loki:3100/loki/api/v1/push"
      }
    }
{{- end }}

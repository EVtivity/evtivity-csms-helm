{{- if and .Values.monitoring.enabled .Values.monitoring.loki.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-loki
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "loki") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "loki") | nindent 4 }}
{{- end }}

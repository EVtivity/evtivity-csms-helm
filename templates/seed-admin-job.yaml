{{- if .Values.initialAdmin.enabled }}
{{- if not .Values.initialAdmin.password }}
{{- fail "initialAdmin.password is required when initialAdmin.enabled is true. Set via --set initialAdmin.password=<value>." }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-seed-admin
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "seed-admin") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "seed-admin") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z {{ .Values.dependencies.postgresHost }} {{ .Values.dependencies.postgresPort }}; do echo "waiting for postgres..."; sleep 2; done']
      containers:
        - name: seed-admin
          image: {{ include "evtivity-csms.image" (dict "context" . "component" "migrate" "values" .Values.migrate) }}
          imagePullPolicy: {{ include "evtivity-csms.imagePullPolicy" . }}
          command:
            - node
            - --input-type=module
            - -e
            - |
              import argon2 from 'argon2';
              import postgres from 'postgres';

              const sql = postgres(process.env.DATABASE_URL);
              const email = process.env.INITIAL_ADMIN_EMAIL;
              const password = process.env.INITIAL_ADMIN_PASSWORD;

              const hash = await argon2.hash(password);

              const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
              const rid = () => { let s = ''; for (let i = 0; i < 12; i++) s += chars[Math.floor(Math.random() * 36)]; return s; };

              const [existing] = await sql`SELECT id FROM roles WHERE name = 'admin'`;
              let roleId;
              if (existing) {
                roleId = existing.id;
              } else {
                const [created] = await sql`
                  INSERT INTO roles (id, name, description, permissions)
                  VALUES (${'rol_' + rid()}, 'admin', 'Full system access', ${JSON.stringify(['*'])}::jsonb)
                  ON CONFLICT (name) DO NOTHING
                  RETURNING id
                `;
                roleId = created?.id ?? (await sql`SELECT id FROM roles WHERE name = 'admin'`)[0].id;
              }

              const [user] = await sql`
                INSERT INTO users (id, email, password_hash, first_name, last_name, role_id, must_reset_password, has_all_site_access)
                VALUES (${'usr_' + rid()}, ${email}, ${hash}, 'Admin', 'User', ${roleId}, true, true)
                ON CONFLICT (email) DO NOTHING
                RETURNING id, email
              `;

              if (user) {
                console.log('Initial admin user created: ' + email);

                const permissions = [
                  'dashboard:read','dashboard:write','stations:read','stations:write',
                  'sites:read','sites:write','sessions:read','sessions:write',
                  'drivers:read','drivers:write','fleets:read','fleets:write',
                  'reservations:read','reservations:write','support:read','support:write',
                  'payments:read','payments:write','pricing:read','pricing:write',
                  'roaming:read','roaming:write','smartCharging:read','smartCharging:write',
                  'certificates:read','certificates:write','conformance:read','conformance:write',
                  'reports:read','reports:write','sustainability:read','sustainability:write',
                  'loadManagement:read','loadManagement:write','logs:read','logs:write',
                  'users:read','users:write',
                  'settings.system:read','settings.system:write',
                  'settings.notification:read','settings.notification:write',
                  'settings.payment:read','settings.payment:write',
                  'settings.integrations:read','settings.integrations:write',
                  'settings.security:read','settings.security:write',
                  'settings.apiKeys:read','settings.apiKeys:write',
                  'settings.firmware:read','settings.firmware:write',
                  'settings.stationConfig:read','settings.stationConfig:write',
                  'settings.smartCharging:read','settings.smartCharging:write',
                  'settings.ai:read','settings.ai:write',
                  'settings.conformance:read','settings.conformance:write',
                ];

                const values = permissions.map(p => ({ user_id: user.id, permission: p }));
                await sql`
                  INSERT INTO user_permissions ${sql(values, 'user_id', 'permission')}
                  ON CONFLICT DO NOTHING
                `;
                console.log('Assigned ' + permissions.length + ' permissions to admin.');
              } else {
                console.log('Admin user already exists: ' + email);
              }

              await sql.end();
          env:
            - name: INITIAL_ADMIN_EMAIL
              value: {{ .Values.initialAdmin.email | quote }}
            - name: INITIAL_ADMIN_PASSWORD
              value: {{ .Values.initialAdmin.password | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "evtivity-csms.secretName" . }}
                  key: DATABASE_URL
          {{- with .Values.migrate.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}

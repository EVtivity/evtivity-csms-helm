{{- if .Values.monitoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-grafana
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "grafana") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "grafana") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/grafana-configmap.yaml") . | sha256sum }}
        checksum/dashboards: {{ include (print $.Template.BasePath "/grafana-dashboards-configmap.yaml") . | sha256sum }}
        checksum/alerting: {{ include (print $.Template.BasePath "/grafana-alerting-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "evtivity-csms.componentSelectorLabels" (dict "context" . "component" "grafana") | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: provisioning-alerting
              mountPath: /etc/grafana/provisioning/alerting
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          {{- with .Values.monitoring.grafana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: provisioning-datasources
          configMap:
            name: {{ include "evtivity-csms.fullname" . }}-grafana-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: provisioning-dashboards
          configMap:
            name: {{ include "evtivity-csms.fullname" . }}-grafana-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: provisioning-alerting
          configMap:
            name: {{ include "evtivity-csms.fullname" . }}-grafana-alerting
        - name: dashboards
          configMap:
            name: {{ include "evtivity-csms.fullname" . }}-grafana-dashboards
            items:
              - key: system-metrics.json
                path: EVtivity Dashboards/system-metrics.json
              - key: business-metrics.json
                path: EVtivity Dashboards/business-metrics.json
              {{- if .Values.monitoring.loki.enabled }}
              - key: logs.json
                path: EVtivity Logs/logs.json
              {{- end }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "evtivity-csms.fullname" . }}-grafana-data
{{- end }}

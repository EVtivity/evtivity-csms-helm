{{- if and .Values.ocpp.enabled .Values.ocpp.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "evtivity-csms.fullname" . }}-ocpp
  labels:
    {{- include "evtivity-csms.componentLabels" (dict "context" . "component" "ocpp") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "evtivity-csms.fullname" . }}-ocpp
  minReplicas: {{ .Values.ocpp.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.ocpp.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ocpp.autoscaling.targetCPUUtilization }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
{{- end }}
